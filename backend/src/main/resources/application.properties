spring.application.name=b-log-backend
spring.config.import=optional:file:./config/local-secrets.properties
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:file:./data/b-log;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.locations=classpath:db/migration

b-log.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
b-log.auth.firebase-enabled=${FIREBASE_ENABLED:false}
b-log.auth.dev-headers-enabled=${DEV_AUTH_HEADERS_ENABLED:false}
b-log.auth.firebase-service-account=${FIREBASE_SERVICE_ACCOUNT:}
b-log.auth.firebase-project-id=${FIREBASE_PROJECT_ID:}
b-log.openai.api-key=${OPENAI_API_KEY:}
b-log.openai.model=${OPENAI_MODEL:gpt-4.1-mini}
b-log.kakao.rest-api-key=${KAKAO_REST_API_KEY:}
b-log.kakao.login-client-secret=${KAKAO_LOGIN_CLIENT_SECRET:}
b-log.kakao.state-secret=${KAKAO_STATE_SECRET:}
b-log.backup.max-bytes=${BACKUP_MAX_BYTES:5242880}
b-log.admin.username=${ADMIN_USERNAME:}
b-log.admin.password=${ADMIN_PASSWORD:}
